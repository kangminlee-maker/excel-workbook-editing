<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Spreadsheet Table Builder</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:#f6f8fb;color:#172033;font-family:Arial,'Apple SD Gothic Neo',sans-serif}
    main{display:grid;grid-template-columns:460px 1fr;gap:14px;min-height:100vh;padding:14px}
    aside,section{background:#fff;border:1px solid #d8e1ea;border-radius:8px}
    aside{padding:16px;overflow:auto;max-height:100vh}
    h1{font-size:24px;margin:0 0 6px}
    h2{font-size:15px;margin:16px 0 8px}
    p{color:#5d6a7a;line-height:1.45}
    .hint{font-size:13px}
    .note{padding:10px;border-radius:8px;background:#eef7fb}
    button,input,textarea,select{font:inherit}
    button{border:0;border-radius:8px;background:#1b7895;color:#fff;font-weight:700;padding:11px;cursor:pointer;width:100%}
    button.secondary{background:#eef3f8;color:#172033}
    button:disabled{opacity:.55;cursor:not-allowed}
    label{display:block;margin:10px 0 4px;color:#5d6a7a;font-weight:700}
    textarea,input,select{width:100%;border:1px solid #cbd7e3;border-radius:8px;padding:10px;background:#fff}
    textarea.prompt{height:92px;font-family:inherit;font-size:14px}
    .actions{display:grid;grid-template-columns:1fr;gap:8px;margin-top:10px}
    .output-canvas-wrap{border:1px solid #cbd7e3;border-radius:8px;background:#fff;overflow:auto;max-height:280px}
    table{border-collapse:separate;border-spacing:0;width:max-content}
    th,td{border-right:1px solid #d7dde8;border-bottom:1px solid #d7dde8;min-width:104px;max-width:220px;height:34px;padding:6px 8px;background:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    th{position:sticky;top:0;background:#eef3f8;text-align:center;z-index:2}
    .row-head{position:sticky;left:0;z-index:1;min-width:48px;background:#eef3f8;text-align:right}
    .canvas td:focus{outline:2px solid #1b7895;outline-offset:-2px;background:#f7fcff}
    .source{overflow:auto;max-height:100vh}
    .source td:hover{outline:2px solid #8cc8dc;outline-offset:-2px}
    .source td.selected-row{background:#e8f7fb}
    .source td.selected-column{background:#fff4d6}
    .source td.selected-measure{background:#eaf8ef}
    .source td b{float:right;color:#1b7895;font-size:11px}
    .preview{margin-top:12px;border:1px solid #d8e1ea;border-radius:8px;background:#fff}
    .preview-head{padding:10px 12px;border-bottom:1px solid #e5ebf2;font-weight:700}
    .preview-head small{display:block;font-weight:400;color:#5d6a7a;margin-top:3px}
    .preview-empty{padding:12px;color:#5d6a7a}
    .preview-scroll{overflow:auto;max-height:220px}
    .preview th,.preview td{position:static;min-width:82px;max-width:220px;height:32px;font-size:12px}
    .preview th{background:#f1f5f9}
    .preview td{text-align:left}
    .plan{padding:12px;border-top:1px solid #e5ebf2}
    .plan h3{font-size:14px;margin:0 0 8px}
    .plan ul{margin:8px 0 0;padding-left:18px;color:#374151;line-height:1.45}
    .plan-note{margin:8px 0 0;padding:10px;border-radius:8px;background:#fff7ed;color:#7c2d12}
    .pill{display:block;border:1px solid #cbd7e3;border-radius:8px;padding:8px 10px;margin:6px 0;background:#f8fafc}
    .status{margin-top:10px;padding:10px;border-radius:8px;background:#f8fafc;color:#374151;white-space:pre-wrap}
    .hidden{display:none}
    @media(max-width:900px){main{grid-template-columns:1fr}.source{max-height:60vh}}
  </style>
</head>
<body>
<main>
  <aside>
    <h1>새 표 만들기</h1>
    <p id="source-title" class="hint">원본을 불러오는 중입니다.</p>
    <h2>1. 원하는 결과표 직접 입력</h2>
    <p class="hint">만들고 싶은 표 모양을 직접 적으세요. 부족한 설명은 아래 문장으로 보충하면 됩니다.</p>
    <div class="output-canvas-wrap"><table id="output-canvas" class="canvas"></table></div>
    <label for="llm-prompt">AI에게 요청할 내용</label>
    <textarea id="llm-prompt" class="prompt" placeholder="예: 이 표의 빈 칸에 브랜드별 결제수단별 결제액 합계를 수식으로 채워줘. 취소는 음수로 반영해줘."></textarea>
    <div class="actions"><button id="submit-intent" type="button">AI에게 이해한 내용 확인하기</button></div>
    <p id="canvas-summary" class="hint note"></p>
    <div id="preview" class="preview" aria-live="polite"></div>
    <h2>선택 사항</h2>
    <p class="hint">원본 열을 알려주고 싶다면 오른쪽 원본 표의 제목 셀을 누르세요.</p>
    <div id="picked"></div>
    <div class="actions">
      <button class="secondary" data-role="row_label" type="button">왼쪽 기준 열</button>
      <button class="secondary" data-role="column_label" type="button">상단 기준 열</button>
      <button class="secondary" data-role="measure" type="button">계산값 열</button>
    </div>
    <div id="status" class="status hidden"></div>
  </aside>
  <section class="source"><table id="source-grid"></table></section>
</main>
<!-- SHEETS_BRIDGE_HOST_ADAPTER_BUNDLE -->
<script>
const state = { data: null, activeRole: 'row_label', fields: {}, planSubmitted: false };
const roleLabels = { row_label: '왼쪽 기준', column_label: '상단 기준', measure: '계산값' };
function escapeHtml(value){ return String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
const hostAdapter = SheetsBridgeHostAdapters.createMcpAppsHostAdapter({
  setStatus,
  appInfo: {
    name: 'sheets-bridge-table-builder',
    title: 'Spreadsheet Table Builder',
    version: '1.0.0',
    description: 'Sketch a desired spreadsheet output table and submit it as a TableBuildIntent.'
  }
});
hostAdapter.onToolResult(content => {
  const source = content && (content.app_source || content.source);
  if(source) loadSource(source);
});
hostAdapter.onToolInput(params => {
  if(params && params.arguments) setStatus('원본 요청을 받았습니다. 데이터를 불러오는 중입니다.');
});
async function initializeBridge(){
  await hostAdapter.initialize();
}
function setStatus(text){ const node = document.getElementById('status'); node.textContent = text; node.classList.toggle('hidden', !text); }
function columnName(index){ let s=''; while(index>0){ index--; s=String.fromCharCode(65 + index % 26)+s; index=Math.floor(index/26); } return s; }
function renderCanvas(){
  const table = document.getElementById('output-canvas');
  const head = `<thead><tr><th></th>${Array.from({length:7},(_,i)=>`<th>${columnName(i+1)}</th>`).join('')}</tr></thead>`;
  const rows = Array.from({length:8},(_,r)=>`<tr><th class="row-head">${r+1}</th>${Array.from({length:7},(_,c)=>`<td contenteditable="true" data-canvas-cell="${columnName(c+1)}${r+1}" aria-label="${columnName(c+1)}${r+1}"></td>`).join('')}</tr>`).join('');
  table.innerHTML = head + `<tbody>${rows}</tbody>`;
  table.addEventListener('input', markIntentDraft);
}
function renderSourceGrid(){
  const grid = state.data?.grid || [];
  const table = document.getElementById('source-grid');
  if(!grid.length){ table.innerHTML = '<tbody><tr><td>원본 미리보기가 없습니다.</td></tr></tbody>'; return; }
  const columns = grid[0] || [];
  const head = `<thead><tr><th></th>${columns.map(cell => `<th>${escapeHtml(cell.column)}</th>`).join('')}</tr></thead>`;
  const rows = grid.map(row => `<tr><th class="row-head">${escapeHtml(row[0]?.row || '')}</th>${row.map(cell => `<td data-a1="${escapeHtml(cell.a1)}" data-column="${escapeHtml(cell.column)}"><span>${escapeHtml(cell.formatted_value) || '&nbsp;'}</span>${cell.formula ? '<b>fx</b>' : ''}</td>`).join('')}</tr>`).join('');
  table.innerHTML = head + `<tbody>${rows}</tbody>`;
  table.querySelectorAll('td[data-column]').forEach(td => td.addEventListener('click', () => {
    state.fields[state.activeRole] = { column: td.dataset.column, header: headerFor(td.dataset.column), selected_cell: td.dataset.a1 };
    state.planSubmitted = false;
    refresh();
  }));
}
function headerFor(column){
  const row = (state.data?.grid || [])[0] || [];
  const cell = row.find(item => item.column === column);
  return (cell && cell.formatted_value) || column;
}
function loadSource(source){
  state.data = source;
  const s = source.source || {};
  document.getElementById('source-title').textContent = `${source.workbook_title || ''} · ${s.sheet_title || ''} · ${s.qualified_range || ''}`;
  renderSourceGrid();
  refresh();
  setStatus('');
}
function readOutputCanvas(){
  const rows = Array.from(document.querySelectorAll('#output-canvas tbody tr')).map(row => Array.from(row.querySelectorAll('td')).map(cell => cell.textContent.trim()));
  let maxRow = -1, maxCol = -1;
  rows.forEach((row,r)=>row.forEach((value,c)=>{ if(value){ maxRow=Math.max(maxRow,r); maxCol=Math.max(maxCol,c); } }));
  if(maxRow < 0 || maxCol < 0) return [];
  return rows.slice(0, maxRow+1).map(row => row.slice(0, maxCol+1));
}
function canvasLabels(canvas){
  return {
    rowLabels: canvas.slice(1).map(row => String(row[0] || '').trim()).filter(Boolean),
    columnLabels: (canvas[0] || []).slice(1).map(value => String(value || '').trim()).filter(Boolean)
  };
}
function shortList(values){ const visible = values.slice(0,8).map(escapeHtml).join(', '); return visible ? visible + (values.length > 8 ? ` 외 ${values.length - 8}개` : '') : '아직 명확히 입력되지 않았습니다'; }
function outputCanvasPreviewHtml(canvas){
  const rows = canvas.slice(0,8);
  const columnCount = Math.max(...rows.map(row => row.length), 1);
  const header = `<tr>${Array.from({length:columnCount},(_,i)=>`<th>${escapeHtml(i === 0 ? '좌측/상단' : '열 ' + i)}</th>`).join('')}</tr>`;
  const body = rows.map(row => `<tr>${Array.from({length:columnCount},(_,i)=>`<td>${escapeHtml(row[i] || '')}</td>`).join('')}</tr>`).join('');
  return `<div class="preview-scroll"><table><thead>${header}</thead><tbody>${body}</tbody></table></div>`;
}
function previewHeader(title, note){ return `<div class="preview-head">${escapeHtml(title)}<small>${escapeHtml(note)}</small></div>`; }
function refresh(){
  const canvas = readOutputCanvas();
  const llmPrompt = document.getElementById('llm-prompt').value.trim();
  const filled = canvas.flat().filter(Boolean).length;
  document.getElementById('canvas-summary').textContent = filled || llmPrompt ? `${canvas.length || 0}행 x ${Math.max(...canvas.map(row=>row.length),0)}열 출력 모양, 입력된 셀 ${filled}개${llmPrompt ? ' · AI 요청 입력됨' : ''}` : '빈 표에 원하는 결과표를 직접 적고, 아래에 AI에게 요청할 내용을 적어주세요.';
  document.getElementById('picked').innerHTML = ['row_label','column_label','measure'].map(role => `<span class="pill">${roleLabels[role]}: ${state.fields[role] ? escapeHtml(state.fields[role].header + ' (' + state.fields[role].column + ')') : '선택 안 함'}</span>`).join('');
  document.querySelectorAll('#source-grid td').forEach(td => {
    td.classList.remove('selected-row','selected-column','selected-measure');
    for(const [role, field] of Object.entries(state.fields)){
      if(field.column === td.dataset.column) td.classList.add(role === 'row_label' ? 'selected-row' : role === 'column_label' ? 'selected-column' : 'selected-measure');
    }
  });
  buildPreview();
}
function buildPreview(){
  const preview = document.getElementById('preview');
  const canvas = readOutputCanvas();
  const labels = canvasLabels(canvas);
  const llmPrompt = document.getElementById('llm-prompt').value.trim();
  if(!state.planSubmitted){
    preview.innerHTML = previewHeader('AI 작업 계획 미리보기', '결과표 모양과 설명을 입력한 뒤 버튼을 누르면 AI가 이해한 내용을 여기서 확인합니다.') + '<div class="preview-empty">아직 AI에게 확인 요청을 보내지 않았습니다.</div>';
    return;
  }
  if(!canvas.length || !llmPrompt){
    preview.innerHTML = previewHeader('입력이 필요합니다', '원하는 결과표 모양과 AI에게 요청할 내용을 함께 입력해주세요.') + '<div class="preview-empty">빈 표에 원하는 결과표를 직접 적고, 필요한 설명을 한두 문장으로 추가하세요.</div>';
    return;
  }
  const pickedFields = ['row_label','column_label','measure'].map(role => state.fields[role] ? `${roleLabels[role]}: ${state.fields[role].header}` : '').filter(Boolean);
  const fieldText = pickedFields.length ? `<li>참고할 원본 열: ${pickedFields.map(escapeHtml).join(' · ')}</li>` : '<li>참고할 원본 열: AI가 원본 범위에서 필요한 열과 수식 근거를 찾습니다</li>';
  preview.innerHTML = previewHeader('이 모양으로 만들까요?', 'AI가 이해한 작업 계획입니다. 표 모양과 요청 내용을 확인하세요.') + outputCanvasPreviewHtml(canvas) + `<div class="plan"><h3>제가 이해한 요청입니다. 이 모양 맞나요?</h3><ul><li>상단에 펼칠 항목: ${shortList(labels.columnLabels)}</li><li>왼쪽에 나열할 항목: ${shortList(labels.rowLabels)}</li><li>추가 설명: ${escapeHtml(llmPrompt)}</li>${fieldText}<li>다음 작업: 원본 데이터와 기존 수식/참조를 찾아, 계산값을 AI가 직접 산출하지 않고 새 시트의 수식과 참조로 채웁니다</li></ul><p class="plan-note">이 내용을 MCP 서버에 저장하고 호스트에게 다음 작업을 요청합니다.</p></div>`;
}
function markIntentDraft(){ state.planSubmitted = false; refresh(); }
function buildIntent(){
  const defaultSpec = state.data?.default_spec || {};
  return {
    source: defaultSpec.source || state.data?.source || {},
    source_package: state.data?.package || {},
    artifact_type: state.data?.artifact_type || defaultSpec.artifact_type || '',
    output_canvas: readOutputCanvas(),
    llm_prompt: document.getElementById('llm-prompt').value.trim(),
    fields: state.fields,
    formula: defaultSpec.formula || {},
    output: defaultSpec.output || {}
  };
}
async function submitIntent(){
  state.planSubmitted = true;
  refresh();
  const intent = buildIntent();
  if(!intent.output_canvas.length || !intent.llm_prompt){ setStatus('먼저 원하는 표 모양을 그리고, AI에게 요청할 내용을 함께 입력해주세요.'); return; }
  setStatus('MCP 서버에 요청 내용을 저장하는 중입니다...');
  try {
    const result = await hostAdapter.callTool('spreadsheet_table_builder_save_intent', { intent });
    const structured = result?.structuredContent || result;
    setStatus(`저장 완료: ${structured.intent_id || ''}\n작업 계획 생성을 요청했습니다.`);
    const nextPrompt = structured.next_prompt || '저장된 TableBuildIntent를 바탕으로 TableBuildPlan을 생성해주세요.';
    await hostAdapter.updateModelContext({ structuredContent: { table_build_intent: structured.intent, intent_package: structured.package }, content: [{ type: 'text', text: nextPrompt }] }).catch(()=>{});
    await hostAdapter.sendMessage(nextPrompt).catch(()=>{});
  } catch(error) {
    hostAdapter.reportError(error);
  }
}
document.querySelectorAll('[data-role]').forEach(button => button.addEventListener('click', () => {
  state.activeRole = button.dataset.role;
  document.querySelectorAll('[data-role]').forEach(item => item.classList.toggle('secondary', item !== button));
}));
document.getElementById('llm-prompt').addEventListener('input', markIntentDraft);
document.getElementById('submit-intent').addEventListener('click', submitIntent);
renderCanvas();
refresh();
initializeBridge();
</script>
</body>
</html>
