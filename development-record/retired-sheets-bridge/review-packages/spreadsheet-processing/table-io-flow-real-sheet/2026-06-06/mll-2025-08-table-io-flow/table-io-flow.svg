<svg viewBox="0 0 1180 760" role="img" aria-labelledby="svg-title svg-desc" xmlns="http://www.w3.org/2000/svg">
  <title id="svg-title">MLL 2025.08 table input output flow</title>
  <desc id="svg-desc">Source tabs feed the current month product performance output table through product matched formulas, daily revenue matrix, ad spend total, CAC, and top summaries.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2f6f8f"/></marker>
    <style>
      .node{fill:#ffffff;stroke:#c8d7e3;stroke-width:2}.source{fill:#eef8f6;stroke:#6bb4a8}.output{fill:#f8fbff;stroke:#6e98c7}.kpi{fill:#fff7e8;stroke:#d6a85d}.alt{fill:#f2f0ff;stroke:#9b88d9}.title{font:700 18px Arial, sans-serif;fill:#172033}.sub{font:400 13px Arial, sans-serif;fill:#526070}.small{font:400 12px Arial, sans-serif;fill:#526070}.edge{stroke:#2f6f8f;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.edge2{stroke:#9b88d9;stroke-width:2.5;fill:none;marker-end:url(#arrow);stroke-dasharray:8 6}.badge{fill:#e8f2fb;stroke:#bfd4e8}.badgeText{font:700 12px Arial, sans-serif;fill:#31536e}
    </style>
  </defs>
  <rect x="0" y="0" width="1180" height="760" fill="#fbfcfe"/>
  <text x="40" y="45" class="title">1. MLL_ 상품별 성과 현황-2025.08 표 I/O 흐름</text>
  <text x="40" y="70" class="sub">대상 출력: A5:AQ129 상품 성과 표 / 증거: values, formulas, grid live snapshots</text>

  <rect class="node source" x="50" y="120" width="270" height="110" rx="10"/><text x="70" y="150" class="title">입력 1: SKU별 성과</text><text x="70" y="178" class="sub">2. MLL_SKU별 성과 현황-2025.08</text><text x="70" y="202" class="small">상품명 C열 + 일자별 거래액 H:AL</text>
  <rect class="node source" x="50" y="285" width="270" height="105" rx="10"/><text x="70" y="315" class="title">입력 2: 광고비</text><text x="70" y="343" class="sub">3. MLL_광고비 현황-2025.08</text><text x="70" y="366" class="small">상품명 D열 + 광고비 E열</text>
  <rect class="node source" x="50" y="455" width="270" height="115" rx="10"/><text x="70" y="485" class="title">현재 탭 차원 정보</text><text x="70" y="513" class="sub">A6:G129</text><text x="70" y="537" class="small">구분, 카테고리, 상품, 런칭일, 기획자, 마케터</text>

  <rect class="node output" x="450" y="110" width="300" height="125" rx="10"/><text x="470" y="140" class="title">일자별 거래액 matrix</text><text x="470" y="168" class="sub">M6:AQ129</text><text x="470" y="192" class="small">상품명 기준 SKU tab SUMIF</text><rect class="badge" x="470" y="205" width="110" height="24" rx="12"/><text x="485" y="222" class="badgeText">3,844 formulas</text>
  <rect class="node output" x="450" y="285" width="300" height="115" rx="10"/><text x="470" y="315" class="title">총 거래액 / 광고비 / CAC</text><text x="470" y="343" class="sub">H:I, L columns</text><text x="470" y="367" class="small">H=sum daily, I=광고비 SUMIFS, L=I/H</text>
  <rect class="node output" x="450" y="465" width="300" height="120" rx="10"/><text x="470" y="495" class="title">상품 성과 표</text><text x="470" y="523" class="sub">A5:AQ129</text><text x="470" y="547" class="small">상품별 월간 overview 최종 출력 표</text>

  <rect class="node kpi" x="870" y="170" width="260" height="130" rx="10"/><text x="890" y="200" class="title">상단 요약</text><text x="890" y="228" class="sub">M3:AQ4, H4:I4:L4, I1</text><text x="890" y="252" class="small">일자별 총계, 언어 제외 세부 PAID안, 신규 total CAC</text>
  <rect class="node alt" x="840" y="445" width="300" height="145" rx="10"/><text x="860" y="475" class="title">대안 설계</text><text x="860" y="503" class="sub">반복 SUMIF → array matrix / 외부 계산</text><text x="860" y="527" class="small">수식 수 4,403개 → 약 8-12개 또는 값 write 중심</text><text x="860" y="551" class="small">쓰기 surface: 출력 block 단위로 최소화</text>

  <path class="edge" d="M320 175 C375 175 390 170 450 170"/><text x="338" y="157" class="small">상품명 x 일자</text>
  <path class="edge" d="M320 337 C382 337 392 340 450 340"/><text x="338" y="323" class="small">상품명 x 광고비</text>
  <path class="edge" d="M320 510 C375 510 390 520 450 525"/><text x="338" y="492" class="small">상품 차원/필터</text>
  <path class="edge" d="M600 235 C600 250 600 265 600 285"/><text x="612" y="263" class="small">row total</text>
  <path class="edge" d="M750 345 C815 330 830 280 870 245"/><text x="770" y="310" class="small">summary</text>
  <path class="edge" d="M600 400 C600 422 600 440 600 465"/>
  <path class="edge" d="M750 525 C820 525 820 525 840 525"/>
  <path class="edge2" d="M610 110 C720 65 915 75 990 170"/><text x="735" y="84" class="small">array spill로 반복식 축소</text>
  <path class="edge2" d="M750 585 C785 650 950 650 990 590"/><text x="800" y="668" class="small">batch values write + rollback snapshot</text>
</svg>